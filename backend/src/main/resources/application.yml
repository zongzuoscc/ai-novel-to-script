spring:
  application:
    name: backend
  config:
    import:
      # 从 backend 目录运行时读取仓库根目录的 .env；从仓库根目录运行时读取当前目录的 .env。
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://localhost:${MYSQL_PORT:3306}/${MYSQL_DATABASE:novel2script}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_APP_USERNAME:novel2script_app}
    password: ${MYSQL_APP_PASSWORD:dev_app_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:10000}
      leak-detection-threshold: ${SPRING_DATASOURCE_HIKARI_LEAK_DETECTION_THRESHOLD:60000}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:novel2script_mq}
    password: ${RABBITMQ_PASSWORD:dev_rabbitmq_password}
    virtual-host: ${RABBITMQ_VHOST:novel2script}
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: ${WORKFLOW_JOB_CONSUMER_CONCURRENCY:1}
        max-concurrency: ${WORKFLOW_JOB_CONSUMER_MAX_CONCURRENCY:2}
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2
  servlet:
    multipart:
      max-file-size: ${SOURCE_FILE_MAX_MB:20}MB
      max-request-size: ${SOURCE_REQUEST_MAX_MB:22}MB
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080
